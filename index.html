async function puxarAssunto(textoUsuario) {
    // 1. FILTROS ORIGINAIS: Mantendo sua limpeza de espaços e filtro de palavras > 3 letras
    const palavras = textoUsuario.toLowerCase().replace(/[^\w\s]/gi, '').split(" ");
    const palavrasChave = palavras.filter(p => p.length > 3);
    
    // Sorteio do "Dado de 15 lados" (1 a 10: Atual | 11 a 14: Passado | 15: Aleatório)
    const sorteio = Math.floor(Math.random() * 15) + 1;
    let sugestao = null;

    try {
        if (sorteio <= 10 && palavrasChave.length > 0) {
            // --- LOGICA 1: ATUAL (10/15) ---
            const palavraSorteada = palavrasChave[Math.floor(Math.random() * palavrasChave.length)];
            let { data } = await _supabase.from('conceitos')
                .select('id, termo_original, termo_limpo') // Select otimizado
                .ilike('termo_limpo', `%${palavraSorteada}%`)
                .neq('termo_limpo', textoUsuario.toLowerCase())
                .limit(1);
            if (data && data.length > 0) sugestao = data[0];
        } 
        
        if (!sugestao && sorteio <= 14) {
            // --- LOGICA 2: PASSADO (4/15) ---
            // Busca o termo que faz mais tempo que não aparece na conversa
            let { data } = await _supabase.from('conceitos')
                .select('id, termo_original, termo_limpo')
                .order('ultima_vez_visto', { ascending: true, nullsFirst: true })
                .limit(1);
            if (data && data.length > 0) sugestao = data[0];
        } 
        
        if (!sugestao) {
            // --- LOGICA 3: ALEATÓRIO (1/15) ---
            // Sorteia um registro qualquer no banco
            const { count } = await _supabase.from('conceitos').select('*', { count: 'exact', head: true });
            const randomOff = Math.floor(Math.random() * (count || 1));
            let { data } = await _supabase.from('conceitos')
                .select('id, termo_original, termo_limpo')
                .range(randomOff, randomOff)
                .maybeSingle();
            if (data) sugestao = data;
        }

        // --- EXECUÇÃO DO GANCHO ---
        if (sugestao && sugestao.termo_limpo !== textoUsuario.toLowerCase()) {
            setTimeout(async () => {
                const prefixo = sortear(VOCABULARIO.gancho);
                adicionarMensagem(`${prefixo} ${sugestao.termo_original}`, 'ba');
                
                // Atualiza a data para que este termo não seja repetido imediatamente no "Passado"
                await _supabase.from('conceitos')
                    .update({ ultima_vez_visto: new Date() })
                    .eq('id', sugestao.id);
            }, 2500); // Timer de 2500ms como solicitado
        }
    } catch (e) { console.error("Erro no puxarAssunto:", e); }
}

    async function criarConexaoTeia(idA, idB) {
        try {
            let { data: link } = await _supabase.from('teia').select('*').or(`and(termo_a.eq.${idA},termo_b.eq.${idB}),and(termo_a.eq.${idB},termo_b.eq.${idA})`).maybeSingle();
            if (link) { await _supabase.from('teia').update({ forca: link.forca + 1 }).eq('id', link.id); }
            else { await _supabase.from('teia').insert({ termo_a: idA, termo_b: idB, forca: 1 }); }
        } catch (e) { }
    }

    function adicionarMensagem(txt, autor) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${autor}`;
        div.innerText = txt;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('btnEnviar').addEventListener('click', enviar);
    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });

            // 1. Reduz a força de todas as conexões na teia em 1 ponto
            // Aqui fazemos um update direto via Supabase
            const { data: todasConexoes } = await _supabase.from('teia').select('id, forca');
            
            for (let conexao of todasConexoes) {
                const novaForca = conexao.forca - 1;
                
                if (novaForca <= 0) {
                    // Se a força zerou, apaga a conexão
                    await _supabase.from('teia').delete().eq('id', conexao.id);
                } else {
                    // Se ainda tem força, apenas atualiza
                    await _supabase.from('teia').update({ forca: novaForca }).eq('id', conexao.id);
                }
            }

            alert("Poda Neural concluída com sucesso!");
        } catch (e) {
            console.error("Erro na poda:", e);
            alert("Erro ao realizar a poda.");
        }
    }
}

</script>
