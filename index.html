<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROJETO B.A.</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; } /* Garante que padding não aumente o tamanho dos elementos */

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f4f4; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 90vh; /* Ocupa a altura da tela */
        }
        
        #chat { 
            flex: 1; /* Ocupa todo o espaço disponível entre o topo e o rodapé */
            overflow-y: auto; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fff;
        }
        
        .msg { 
            padding: 12px 18px; 
            border-radius: 15px; 
            max-width: 85%; 
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-size: 16px;
        }
        
        .ba { background: #f1f1f1; border-left: 5px solid #cc0000; align-self: flex-start; }
        .user { background: #cc0000; color: #fff; align-self: flex-end; }
        
        #input-area { 
            padding: 15px; 
            background: #fff; 
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
            flex-shrink: 0; /* Impede que a barra de texto diminua de tamanho */
        }
        
        input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 25px; 
            font-size: 16px;
            outline: none;
        }
        
        button { 
            background: #cc0000; 
            color: #fff; 
            border: none; 
            border-radius: 25px; 
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="chat">
        <div class="msg ba">OI! Eu sou o Ômega 7. O que vamos aprender hoje?</div>
    </div>

    <div id="input-area">
        <input type="text" id="userInput" placeholder="Escreva aqui..." autocomplete="off">
        <button id="btnEnviar">ENVIAR</button>
    </div>

    <script>
    // Configurações de Conexão
    const SUPABASE_URL = 'https://tibbxblpnnqpbhhrzevr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpYmJ4Ymxwbm5xcGJoaHJ6ZXZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTU2NTgsImV4cCI6MjA5MTY5MTY1OH0.ziT_pvO7OYfQEXqfnQ7bXCWjTnNg6US1gMjZVNwkig4';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Estados de Memória do Sistema
    let modoAprender = false;
    let termoPendente = '';
    let conceitoAnteriorId = null; 

    // --- FUNÇÃO PRINCIPAL DE ENVIO (Com Lógica de Probabilidade/Roleta) ---
    async function enviar() {
        const input = document.getElementById('userInput');
        const texto = input.value.trim();
        if (!texto) return;

        adicionarMensagem(texto, 'user');
        input.value = '';

        try {
            const termoLimpo = texto.toLowerCase().replace(/[^\w\s]/gi, '').trim();

            if (modoAprender) {
                const novoC = await salvarNovoConhecimento(termoPendente, texto);
                const falasAprendeu = [`Entendi!`, `Anotado.`, `Saquei!`, `Legal, aprendi.`];
                adicionarMensagem(falasAprendeu[Math.floor(Math.random() * falasAprendeu.length)], 'ba');
                
                if (conceitoAnteriorId && novoC) await criarConexaoTeia(conceitoAnteriorId, novoC.id);
                conceitoAnteriorId = novoC ? novoC.id : null;
                modoAprender = false;
                termoPendente = '';
                return;
            }

            let { data: conceito } = await _supabase
                .from('conceitos')
                .select('*, respostas(*)')
                .eq('termo_limpo', termoLimpo)
                .maybeSingle();

            if (!conceito || !conceito.respostas || conceito.respostas.length === 0) {
                modoAprender = true;
                termoPendente = texto;
                adicionarMensagem(`Não sei o que dizer sobre isso, me ensina?`, 'ba');
            } else {
                // Atualiza última vez visto e conexões da teia
                await _supabase.from('conceitos').update({ ultima_vez_visto: new Date() }).eq('id', conceito.id);
                if (conceitoAnteriorId && conceitoAnteriorId !== conceito.id) await criarConexaoTeia(conceitoAnteriorId, conceito.id);
                conceitoAnteriorId = conceito.id;

                const r = conceito.respostas;
                
                // --- LÓGICA DE SORTEIO PROPORCIONAL (Pensamento Filosófico vs Matemático) ---
                // Aqui ele soma os votos (denominador) e sorteia uma resposta baseada na probabilidade
                const totalVotos = r.reduce((acc, curr) => acc + curr.votos, 0);
                let numeroSorteado = Math.random() * totalVotos;
                let respostaEscolhida = r[0];

                for (let i = 0; i < r.length; i++) {
                    if (numeroSorteado < r[i].votos) {
                        respostaEscolhida = r[i];
                        break;
                    }
                    numeroSorteado -= r[i].votos;
                }

                // Chance de questionar para expandir o conhecimento (Humano)
                if (totalVotos < 20 && Math.random() > 0.6) {
                    modoAprender = true;
                    termoPendente = texto;
                    adicionarMensagem(`Geralmente eu respondo "${respostaEscolhida.texto_resposta}", mas tem outro jeito?`, 'ba');
                } else {
                    adicionarMensagem(respostaEscolhida.texto_resposta, 'ba');
                    // Chama a varredura para puxar assunto relacionado
                    puxarAssunto(texto); 
                }
            }
        } catch (err) { console.error("Erro:", err); }
    }

    // --- FUNÇÃO DE VARREDURA (Puxar assunto por palavra-chave) ---
    async function puxarAssunto(textoUsuario) {
        const palavras = textoUsuario.toLowerCase().replace(/[^\w\s]/gi, '').split(" ");
        const palavrasChave = palavras.filter(p => p.length > 3);
        if (palavrasChave.length === 0) return;
        
        const palavraSorteada = palavrasChave[Math.floor(Math.random() * palavrasChave.length)];

        let { data: conexoes } = await _supabase
            .from('conceitos')
            .select('*')
            .ilike('termo_limpo', `%${palavraSorteada}%`)
            .limit(5);

        if (conexoes && conexoes.length > 0) {
            const sugestao = conexoes.find(c => c.termo_limpo !== textoUsuario.toLowerCase()) || conexoes[0];
            if (sugestao.termo_limpo === textoUsuario.toLowerCase()) return;

            setTimeout(() => {
                const falas = [
                    `Sabe o que eu lembrei? ${sugestao.termo_original}`,
                    `Me veio uma dúvida: ${sugestao.termo_original}`,
                    `Aproveitando o gancho... ${sugestao.termo_original}`
                ];
                adicionarMensagem(falas[Math.floor(Math.random() * falas.length)], 'ba');
            }, 2500); 
        }
    }

    // --- FUNÇÕES DE SUPORTE (Persistência e Teia) ---
    async function salvarNovoConhecimento(pergunta, resposta) {
        try {
            const termoLimpo = pergunta.toLowerCase().replace(/[^\w\s]/gi, '').trim();
            const { data: nc } = await _supabase.from('conceitos').upsert({ termo_limpo: termoLimpo, termo_original: pergunta }).select().single();
            
            let { data: respExistente } = await _supabase.from('respostas').select('*').eq('conceito_id', nc.id).eq('texto_resposta', resposta).maybeSingle();

            if (respExistente) {
                await _supabase.from('respostas').update({ votos: respExistente.votos + 1 }).eq('id', respExistente.id);
            } else {
                await _supabase.from('respostas').insert({ conceito_id: nc.id, texto_resposta: resposta, tipo_pensamento: 'humano' });
            }
            return nc;
        } catch (e) { return null; }
    }

    async function criarConexaoTeia(idA, idB) {
        try {
            let { data: link } = await _supabase.from('teia').select('*').or(`and(termo_a.eq.${idA},termo_b.eq.${idB}),and(termo_a.eq.${idB},termo_b.eq.${idA})`).maybeSingle();
            if (link) { await _supabase.from('teia').update({ forca: link.forca + 1 }).eq('id', link.id); }
            else { await _supabase.from('teia').insert({ termo_a: idA, termo_b: idB, forca: 1 }); }
        } catch (e) { }
    }

    function adicionarMensagem(txt, autor) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${autor}`;
        div.innerText = txt;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('btnEnviar').addEventListener('click', enviar);
    document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviar(); });
</script>

</body>
</html>
