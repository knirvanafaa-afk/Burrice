// 🎲 UTILIDADE DE SORTEIO

function sortear(lista) {
    return lista[Math.floor(Math.random() * lista.length)];
}

// 🔤 NORMALIZAÇÃO DE TEXTO

function normalizarTexto(texto) {
    if (!texto) return "";

    return texto
        .toString()
        .normalize("NFD") // remove acentos
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .trim()
        .replace(/[^\w\s]/g, "") // remove pontuação
        .replace(/\s+/g, " "); // remove espaços duplicados
}

// 🔎 COMPARAÇÃO SEGURA

function textosIguais(a, b) {
    return normalizarTexto(a) === normalizarTexto(b);
}

// 📊 CALCULAR FREQUÊNCIAS

function calcularFrequencias(respostas) {
    const total = respostas.reduce((soma, r) => soma + r.quantidade, 0);

    return respostas.map(r => {
        const freq = total > 0 ? r.quantidade / total : 0;

        return {
            ...r,
            frequencia: freq,
            tipo: classificarFrequencia(freq)
        };
    });
}

// 🧠 CLASSIFICAÇÃO DA FREQUÊNCIA

function classificarFrequencia(freq) {
    if (freq >= 0.8) return "matematico";
    if (freq >= 0.4) return "humano";
    return "filosofico";
}

// 🏆 OBTER RESPOSTA DOMINANTE

function obterRespostaDominante(respostas) {
    if (!respostas || respostas.length === 0) return null;

    return respostas.reduce((maior, atual) => {
        return atual.quantidade > maior.quantidade ? atual : maior;
    });
}

// 📊 CLASSIFICAÇÃO DO CONCEITO

function classificarConceito(respostasComFreq) {
    if (!respostasComFreq.length) return "desconhecido";

    const dominante = obterRespostaDominante(respostasComFreq);

    if (!dominante) return "desconhecido";

    return classificarFrequencia(dominante.frequencia);
}

// ➕ REFORÇAR RESPOSTA (Usa QUANTIDADE)

async function reforcarResposta(respostaId, quantidadeAtual) {
    const novaQuantidade = parseFloat(quantidadeAtual) + 1;
    await _supabase

        .update({ quantidade: novaQuantidade })
        .eq("id", respostaId);
}

// 🌱 APRENDIZADO PASSIVO (5%)

async function aprendizagemPassiva(conceitoId, respostas, textoUsuario) {
    const existente = encontrarRespostaExistente(respostas, textoUsuario);

    if (existente) {
        // +1 na correta

        // -0.2 nas outras
        for (let r of respostas) {
            if (r.id !== existente.id) {
                const novaQuantidade = r.quantidade - 0.2;

                if (novaQuantidade <= 0) {
                    await removerResposta(r.id);
                } else {

                }
            }
        }
    } else {

    }
}

// 🔗 GRAVAR NA TEIA (Usa VOTOS para Silogismos)

async function criarOuReforcarTeia(idA, idB) {
    if (!idA || !idB || idA === idB) return;
    const { data } = await _supabase
        .from("teia")
        .select("*")
        .or(`and(conceito_a.eq.${idA},conceito_b.eq.${idB}),and(conceito_a.eq.${idB},conceito_b.eq.${idA})`)
        .maybeSingle();

    if (data) {
        await _supabase.from("teia")
            .update({ votos: data.votos + 1 })
            .eq("id", data.id);
    } else {
        await _supabase.from("teia")
            .insert({ conceito_a: idA, conceito_b: idB, votos: 1 });
    }
}

// 🔍 BUSCAR CONEXÕES FORTES

async function buscarConexoes(conceitoId) {
    const { data } = await _supabase
        .from("teia")
        .select("*")
        .or(`conceito_a.eq.${conceitoId},conceito_b.eq.${conceitoId}`);

    return data || [];
}

// 🧠 OBTER CONCEITO RELACIONADO


async function criarOuReforcarTeia(idA, idB, texto = "") {

    if (!idA || !idB || idA === idB) return;

    // 🔤 normaliza texto
    const t = normalizarTexto(texto);

    // 📉 fator de força (base)
    let fator = 1;

    // 🔻 redução de força por negação implícita (sem classificar fixo)
    if (t.includes("nao") || t.includes("nunca") || t.includes("jamais")) {
        fator = -1; // afasta
    }

    // 🔺 leve reforço por afirmação natural
    if (
        t.includes("sim") ||
        t.includes("exatamente") ||
        t.includes("claro") ||
        t.includes("certeza")
    ) {
        fator = 2; // aproxima mais forte
    }

    // 🔍 busca conexão direta
    const { data } = await _supabase
        .from("teia")
        .select("*")
        .or(`and(conceito_a.eq.${idA},conceito_b.eq.${idB}),and(conceito_a.eq.${idB},conceito_b.eq.${idA})`)
        .maybeSingle();

    if (data) {

        let novosVotos = data.votos + fator;

        // ❌ evita negativo extremo
        if (novosVotos < 0) novosVotos = 0;

        await _supabase
            .from("teia")
            .update({ votos: novosVotos })
            .eq("id", data.id);

    } else {

        // só cria se for positivo
        if (fator > 0) {
            await _supabase
                .from("teia")
                .insert({
                    conceito_a: idA,
                    conceito_b: idB,
                    votos: fator
                });
        }
    }

    // 🔥 INFERÊNCIA (SILOGISMO SIMPLES)
    // A → B e B → C => A → C (com força reduzida)

    const { data: conexoesA } = await _supabase
        .from("teia")
        .select("*")
        .or(`conceito_a.eq.${idA},conceito_b.eq.${idA}`);

    if (!conexoesA) return;

    for (let conexao of conexoesA) {

        const idC =
            conexao.conceito_a === idA
                ? conexao.conceito_b
                : conexao.conceito_a;

        if (idC === idB) continue;

        // 🔗 força indireta (decai)
        const pesoIndireto = Math.floor(conexao.votos * 0.3);

        if (pesoIndireto <= 0) continue;

        // verifica se já existe A → C
        const { data: existente } = await _supabase
            .from("teia")
            .select("*")
            .or(`and(conceito_a.eq.${idB},conceito_b.eq.${idC}),and(conceito_a.eq.${idC},conceito_b.eq.${idB})`)
            .maybeSingle();

        if (existente) {

            await _supabase
                .from("teia")
                .update({ votos: existente.votos + pesoIndireto })
                .eq("id", existente.id);

        } else {

            await _supabase
                .from("teia")
                .insert({
                    conceito_a: idB,
                    conceito_b: idC,
                    votos: pesoIndireto
                });
        }
    }
}

async function obterConceitoRelacionado(conceitoId) {
    const conexoes = await buscarConexoes(conceitoId);

    if (!conexoes.length) return null;

    const aleatoria = conexoes[Math.floor(Math.random() * conexoes.length)];

    const outroId =
        aleatoria.conceito_a === conceitoId
            ? aleatoria.conceito_b
            : aleatoria.conceito_a;

    const { data } = await _supabase
        .from("conceitos")

        .eq("id", outroId)
        .single();

    return data;
}

// 🧠 DECIDIR RESPOSTA PRINCIPAL


async function escolherResposta(conceitoId, respostasComFreq) {

    if (!respostasComFreq.length) return null;

    // 🏆 resposta direta (base)
    const dominante = obterRespostaDominante(respostasComFreq);

// 🔒 TRAVA DE SEGURANÇA

const LIMIAR_DOMINANTE = 3;

if (dominante && dominante.quantidade >= LIMIAR_DOMINANTE) {
    return {
        tipo: classificarFrequencia(1),
        resposta: dominante.texto,
        duvida: false,
        origem: "direta_forte"
    };
}

    let melhorResposta = dominante;
    let melhorScore = dominante ? dominante.quantidade : 0;

    // 🔗 buscar conexões da teia
    const conexoes = await buscarConexoes(conceitoId) || [];

    for (let conexao of conexoes) {

        const outroId =
            conexao.conceito_a === conceitoId
                ? conexao.conceito_b
                : conexao.conceito_a;

       let respostasRelacionadas = await buscarRespostas(outroId) || [];

if (!respostasRelacionadas.length) {
    respostasRelacionadas = [{
        texto: "relacionado",
        quantidade: conexao.votos || 1
    }];
}

        for (let r of respostasRelacionadas) {

            const pesoTeia = (conexao.votos || 0) * 0.3; // reduz influência

const score = (r.quantidade || 1) + pesoTeia;

            if (score > melhorScore) {
                melhorScore = score;
                melhorResposta = r;
            }
        }
    }

    if (!melhorResposta) return null;

    const freqBase = melhorResposta.quantidade || 1;
    const freqFake = freqBase / (freqBase + 1);

    const tipo = classificarFrequencia(freqFake);

    return {
        tipo,
        resposta: melhorResposta.texto,
        duvida: tipo === "filosofico",
        origem: melhorResposta === dominante ? "direta" : "teia"
    };
}

function montarRespostaFinal(decisao) {

    if (!decisao) return "Não sei.";

    if (decisao.tipo === "filosofico") {
        return `${decisao.resposta}, mas não tenho certeza. O que você acha?`;
    }

    return decisao.resposta;
}

//QUEBRAR FRASES TEIA

function quebrarFrases(texto) {
    return texto
        .split(/[.!?]+/)
        .map(s => s.trim())
        .filter(s => s.length > 0);
}

// 🚀 FUNÇÃO PRINCIPAL


async function enviar() {
    const input = document.getElementById("userInput");
    
const textoOriginal = input.value;

if (!textoOriginal.trim()) return;

adicionarMensagem(textoOriginal, "user");

input.value = "";

// 🔥 quebra em partes
const partes = quebrarFrases(textoOriginal);

// 🔁 processa cada parte corretamente
for (let parte of partes) {

    const textoOriginalParte = parte;
const textoNormalizado = normalizarTexto(textoOriginalParte);

// 🔁 aprendizado sequencial usa NORMALIZADO
if (ultimaRespostaOmega) {
await aprenderSequencia(textoOriginalParte);
}

    // 👉 daqui pra frente usa "texto" e "textoOriginalParte"


    // 🌳 COMANDO ESPECIAL (PODA)

    if (texto === "executar_poda_anual") {
        await realizarPodaNeuralAnual();
        adicionarMensagem("Poda realizada.", "ba");
        continue;
    }


    // 📚 MODO APRENDER

    if (modoAprender && termoPendente) {
    const conceito = await buscarOuCriarConceito(termoPendente);
    const respostas = await buscarRespostas(conceito.id);

    await aprendizadoAtivo(conceito.id, respostas, textoOriginalParte);

    // 🔗 ATIVA TEIA DURANTE APRENDIZADO
    if (conceitoAnteriorId) {
        await criarOuReforcarTeia(conceitoAnteriorId, conceito.id, textoOriginalParte);

// 🔥 memória curta (complemento, não substituição)

if (ultimoConceito && ultimoConceito !== conceito.id) {
    await criarOuReforcarTeia(ultimoConceito, conceito.id, textoOriginalParte.slice(0, 20));
    }


ultimoConceito = conceito.id;

    }

    conceitoAnteriorId = conceito.id;

    modoAprender = false;
    termoPendente = null;

    adicionarMensagem(sortear(VOCABULARIO.aprendeu), "ba");
    continue;
}

    // 🔍 BUSCAR CONCEITO

    let conceito = await buscarConceito(texto);

    // ❓ NÃO EXISTE → PERGUNTA

    if (!conceito) {
        modoAprender = true;
        termoPendente = textoOriginalParte;

        adicionarMensagem(perguntaObrigatoria(), "ba");
        continue;
    }

    // 📥 BUSCAR RESPOSTAS

    let respostas = await buscarRespostas(conceito.id);

    if (!respostas.length) {
        modoAprender = true;
        termoPendente = textoOriginalParte;

        adicionarMensagem(perguntaObrigatoria(), "ba");
        continue;
    }
 
  // 📊 FREQUÊNCIA E CLASSIFICAÇÃO
   
    const respostasComFreq = calcularFrequencias(respostas);

    const decisao = await escolherResposta(conceito.id, respostasComFreq);

    const respostaFinal = montarRespostaFinal(decisao);

    adicionarMensagem(respostaFinal, "ba");

    // 🔁 ATUALIZA TEIA
    
    if (conceitoAnteriorId) {
        await criarOuReforcarTeia(conceitoAnteriorId, conceito.id, textoOriginal);
    }

    conceitoAnteriorId = conceito.id;

    // ❓ CONFIRMAÇÃO (20%)
  
    if (deveConfirmar()) {
        adicionarMensagem("Isso está correto?", "ba");
        modoAprender = true;
        termoPendente = textoOriginalParte;
        continue;
    }

    // 🌱 APRENDIZAGEM PASSIVA (5%)
   
    if (deveAprenderPassivo()) {
        adicionarMensagem("Pode confirmar isso?", "ba");
        modoAprender = true;
        termoPendente = textoOriginalParte;
        continue;
    }

    // 🧠 CURIOSIDADE (20%)
   
    if (devePerguntarCuriosidade()) {
        const pergunta = await gerarPerguntaCuriosidade(conceito.id);

        if (pergunta) {
            adicionarMensagem(pergunta, "ba");
           }
       }
   }
}

// 🌳 PODA NEURAL ANUAL

async function realizarPodaNeuralAnual() {

    // 📉 PODA RESPOSTAS
   
    const { data: respostas } = await _supabase
        .from("respostas")
        .select("*");

    for (let r of respostas) {
        const novaQuantidade = r.quantidade - 1;

        if (novaQuantidade <= 0) {
            await removerResposta(r.id);
        } else {
            await atualizarQuantidade(r.id, novaQuantidade);
        }
    }

    // 🔗 PODA TEIA
   
    // 🔗 PODA TEIA
const { data: teias } = await _supabase
    .from("teia")
    .select("*");

for (let t of teias) {

    const novosVotos = t.votos - 1;

    if (novosVotos <= 0) {

        await _supabase
            .from("teia")
            .delete()
            .eq("id", t.id);

    } else {

        await _supabase
            .from("teia")
            .update({ votos: novosVotos })
            .eq("id", t.id);
    }
}

    // 🧹 LIMPAR CONCEITOS VAZIOS
   
    const { data: conceitos } = await _supabase
        .from("conceitos")
        .select("*");

    for (let c of conceitos) {
        const { data: respostasDoConceito } = await _supabase
            .from("respostas")
            .select("id")
            .eq("conceito_id", c.id);

        if (!respostasDoConceito || respostasDoConceito.length === 0) {
            await _supabase
                .from("conceitos")
                .delete()
                .eq("id", c.id);
        }
    }
}

// 💬 ADICIONAR MENSAGEM NO CHAT

function adicionarMensagem(texto, tipo) {

    const chat = document.getElementById("chat");

    const div = document.createElement("div");

    div.classList.add("msg", tipo);

    div.textContent = texto;

    chat.appendChild(div);

    chat.scrollTop = chat.scrollHeight;

    // ✅ CAPTURA RESPOSTA DO ÔMEGA (IMPORTANTE)
    if (tipo === "ba") {
        ultimaRespostaOmega = texto;
    }
}

document.getElementById("btnEnviar").addEventListener("click", enviar);

async function aprenderSequencia(textoUsuario) {

    try {

        if (!ultimaRespostaOmega) return;

        const conceito = await buscarOuCriarConceito(ultimaRespostaOmega);

        const respostas = await buscarRespostas(conceito.id);

        const existente = encontrarRespostaExistente(respostas, textoUsuario);

        if (existente) {
            await reforcarResposta(existente.id, existente.quantidade);
        } else {

            await _supabase
    .from("respostas")
    .insert({
        conceito_id: conceito.id,
        texto: textoUsuario,
        quantidade: 0.1
    });

        }

    } catch (e) {
        console.error("Erro aprendizado sequencial:", e);
    }
}
