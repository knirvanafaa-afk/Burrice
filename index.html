<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROJETO B.A.</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; } /* Garante que padding não aumente o tamanho dos elementos */

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f4f4; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 90vh; /* Ocupa a altura da tela */
        }
        
        #chat { 
            flex: 1; /* Ocupa todo o espaço disponível entre o topo e o rodapé */
            overflow-y: auto; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fff;
        }
        
        .msg { 
            padding: 12px 18px; 
            border-radius: 15px; 
            max-width: 85%; 
            word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-size: 16px;
        }
        
        .ba { background: #f1f1f1; border-left: 5px solid #cc0000; align-self: flex-start; }
        .user { background: #cc0000; color: #fff; align-self: flex-end; }
        
        #input-area { 
            padding: 15px; 
            background: #fff; 
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
            flex-shrink: 0; /* Impede que a barra de texto diminua de tamanho */
        }
        
        input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 25px; 
            font-size: 16px;
            outline: none;
        }
        
        button { 
            background: #cc0000; 
            color: #fff; 
            border: none; 
            border-radius: 25px; 
            padding: 0 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="chat">
        <div class="msg ba">OI! Eu sou a Burrice Artificial. O que vamos aprender hoje?</div>
    </div>

    <div id="input-area">
        <input type="text" id="userInput" placeholder="Escreva aqui..." autocomplete="off">
        <button id="btnEnviar">ENVIAR</button>
    </div>

    <script>
    const SUPABASE_URL = 'https://tibbxblpnnqpbhhrzevr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpYmJ4Ymxwbm5xcGJoaHJ6ZXZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTU2NTgsImV4cCI6MjA5MTY5MTY1OH0.ziT_pvO7OYfQEXqfnQ7bXCWjTnNg6US1gMjZVNwkig4';
    
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let modoAprender = false;
    let termoPendente = '';

    async function enviar() {
        const input = document.getElementById('userInput');
        const texto = input.value.trim();
        if (!texto) return;

        adicionarMensagem(texto, 'user');
        input.value = '';

        try {
            if (modoAprender) {
                await salvarNovoConhecimento(termoPendente, texto);
                adicionarMensagem(`Entendi! "${termoPendente}" é "${texto}". Próximo!`, 'ba');
                modoAprender = false;
                termoPendente = '';
                return;
            }

            const termoLimpo = texto.toLowerCase().replace(/[^\w\s]/gi, '').trim();

            let { data: conceito, error } = await _supabase
                .from('conceitos')
                .select('*, respostas(*)')
                .eq('termo_limpo', termoLimpo)
                .single();

            if (error || !conceito) {
                modoAprender = true;
                termoPendente = texto;
                adicionarMensagem(`Não sei o que é "${texto}". Como eu respondo?`, 'ba');
            } else {
                const r = conceito.respostas;
                if (r && r.length > 0) {
                    const melhor = r.sort((a, b) => b.votos - a.votos)[0];
                    adicionarMensagem(melhor.texto_resposta, 'ba');
                } else {
                    modoAprender = true;
                    termoPendente = texto;
                    adicionarMensagem(`Esqueci a resposta de "${texto}". Me ensina de novo?`, 'ba');
                }
            }
        } catch (err) {
            console.error("Erro na função enviar:", err);
            adicionarMensagem("Deu um erro aqui no meu cérebro (banco de dados).", 'ba');
        }
    }

    async function salvarNovoConhecimento(pergunta, resposta) {
        const termoLimpo = pergunta.toLowerCase().replace(/[^\w\s]/gi, '').trim();
        
        const { data: nc, error: errC } = await _supabase
            .from('conceitos')
            .upsert({ termo_limpo: termoLimpo, termo_original: pergunta })
            .select().single();

        if (errC) { console.error(errC); return; }

        await _supabase.from('respostas').insert({ 
            conceito_id: nc.id, 
            texto_resposta: resposta,
            tipo_pensamento: 'humano'
        });
    }

    function adicionarMensagem(txt, autor) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${autor}`;
        div.innerText = txt;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('btnEnviar').addEventListener('click', enviar);
    document.getElementById('userInput').addEventListener('keypress', (e) => { 
        if(e.key === 'Enter') enviar(); 
    });
</script>
</body>
</html>
